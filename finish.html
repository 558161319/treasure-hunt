<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Completion Certificate</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:#eef2f5;
      font-family:Georgia,'Times New Roman',serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2rem 1rem;
    }

    .cert-card{
      max-width:700px;
      width:100%;
      background:white;
      border-radius:24px;
      padding:clamp(1.8rem,5vw,3rem);
      text-align:center;
      box-shadow:0 15px 40px rgba(0,0,0,0.1);
      border-top:8px solid #e6b17e;
      position:relative;
    }

    /* 顶部校徽 */
    .logo-img {
      width:80px;
      height:80px;
      margin:0 auto 1rem;
      object-fit:contain;
    }

    h1{
      font-size:2.4rem;
      margin-bottom:0.5rem;
      color:#1a2a3a;
    }

    .subtitle{
      font-size:1.1rem;
      color:#444;
      margin-bottom:1.5rem;
    }

    input{
      padding:12px 20px;
      border-radius:60px;
      border:1px solid #ddd;
      width:75%;
      margin:1rem auto;
      font-size:1rem;
      display:block;
      text-align:center;
    }

    .btn-group{
      display:flex;
      justify-content:center;
      gap:1rem;
      flex-wrap:wrap;
      margin:1rem 0;
    }

    button{
      background:#1e3a5f;
      color:white;
      border:none;
      padding:10px 28px;
      border-radius:40px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }
    button:hover{
      background:#e6b17e;
      color:#1e3a5f;
    }

    /* 证书主体 + 水印背景 */
    #certResult{
      margin-top:2rem;
      background:#fef9ef;
      padding:2.5rem 2rem;
      border-radius:20px;
      border:2px solid #e6b17e;
      line-height:1.8;
      position:relative;
      overflow:hidden;
    }

    /* 水印 */
    #certResult::before {
      content:"";
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:220px;
      height:220px;
      background-image:url('https://www.henu.edu.cn/__local/9/logo.png');
      background-size:contain;
      background-repeat:no-repeat;
      background-position:center;
      opacity:0.12;
      z-index:0;
    }

    #certResult * {
      position:relative;
      z-index:1;
    }

    #certResult h2{
      font-size:1.9rem;
      margin-bottom:1.2rem;
      color:#1e3a5f;
    }

    .route{
      font-size:0.9rem;
      margin:1.2rem 0;
      color:#333;
      line-height:1.6;
    }

    .footer{
      margin-top:2rem;
      font-size:0.9rem;
      color:#5f7f9e;
    }

    /* 打印优化 */
    @media print{
      body{background:white;padding:0;}
      .cert-card{box-shadow:none;border:none;}
      input,.btn-group,.footer{display:none;}
      #certResult{border:1px solid #999;padding:2rem;}
    }
  </style>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body>
<div class="cert-card" id="certCard">
  <!-- 河南大学校徽 -->
  <img src="./images/henu.jpg" class="logo-img" alt="Henan University Logo">

  <h1>🎓 Explorer's Certificate</h1>
  <p class="subtitle">You have completed all 10 historical landmarks at Henan University Minglun Campus.</p>

  <input type="text" id="studentName" placeholder="Enter your full name" autocomplete="off">
  
  <div class="btn-group">
    <button id="genBtn">✨ Generate Certificate ✨</button>
    <button onclick="location.href='index.html'">🏠 Home</button>
    <button id="downloadBtn" style="display:none;">📥 Download</button>
  </div>

  <div id="certResult"></div>

  <div class="footer">Henan University · Cultural Heritage Tour</div>
</div>

<script>
  // 权限判断
  let completed = JSON.parse(localStorage.getItem('completed') || '[]');
  if (!completed.includes('10')) {
    alert('Complete all 10 locations first!');
    location.href = 'index.html';
  }

  const genBtn = document.getElementById('genBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const certResult = document.getElementById('certResult');

  genBtn.addEventListener('click', function(){
    let name = document.getElementById('studentName').value.trim();
    if(!name) { alert('Please enter your name.'); return; }
    let date = new Date().toLocaleDateString('en-US');

    certResult.innerHTML = `
      <h2>📜 Certificate of Completion</h2>
      <p>This certifies that</p>
      <h3 style="font-size:1.8rem; margin:0.6rem 0; color:#1e3a5f;">${name}</h3>
      <p>has successfully finished the</p>
      <p><strong>Henan University Minglun Campus Treasure Hunt</strong></p>
      <div class="route">
        South Gate → Prep School Gate → No.6 Building → War Monument → No.7 Building → Imperial Exam Monument → New Library → No.10 Building → Grand Auditorium → East No.10 Studio
      </div>
      <p style="margin-top:1rem;">Date: ${date}</p>
      <p style="margin-top:1.5rem; font-weight:bold;">🏅 Henan University Heritage Committee</p>
    `;

    downloadBtn.style.display = 'inline-block';
  });

  // 下载证书为图片
  downloadBtn.addEventListener('click', async () => {
    const target = document.getElementById('certResult');
    const canvas = await html2canvas(target, { scale: 2 });
    const link = document.createElement('a');
    link.download = `HENU_Certificate_${document.getElementById('studentName').value}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
</script>
</body>
</html>
