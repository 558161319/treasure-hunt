<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Certificate - Henan University Treasure Hunt</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#eef2f5;font-family:'Georgia','Segoe UI',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .cert-card{max-width:650px;width:100%;background:white;border-radius:32px;padding:clamp(1.5rem,5vw,2.5rem);text-align:center;box-shadow:0 20px 35px rgba(0,0,0,0.1);border-top:8px solid #e6b17e;}
    input{padding:10px 18px;border-radius:60px;border:1px solid #ccc;width:70%;margin:1rem 0;font-size:1rem;}
    button{background:#1e3a5f;color:white;border:none;padding:10px 28px;border-radius:40px;font-weight:bold;margin:0.5rem;cursor:pointer;transition:0.2s;}
    button:hover{background:#e6b17e;color:#1e3a5f;}
    #certResult{margin-top:1.8rem;background:#fef9ef;padding:1.5rem;border-radius:24px;border:1px dashed #e6b17e;}
    .footer{margin-top:2rem;font-size:0.8rem;color:#5f7f9e;}
  </style>
</head>
<body>
<div class="cert-card">
  <h1>🎓 Explorer's Certificate</h1>
  <p>You have walked through history at Henan University. Enter your name to claim your award.</p>
  <input type="text" id="studentName" placeholder="Your full name" autocomplete="off">
  <br>
  <button id="genBtn">✨ Generate Certificate ✨</button>
  <button onclick="location.href='index.html'">🏠 Back to Home</button>
  <div id="certResult"></div>
  <div class="footer">Henan University · Office of Cultural Heritage</div>
</div>
<script>
  let expected = parseInt(localStorage.getItem('nextExpected'));
  if (isNaN(expected) || expected !== 7) {
    alert('You must complete all 6 treasure hunt locations first!');
    location.href = 'index.html';
  }
  document.getElementById('genBtn').addEventListener('click', function(){
    let name = document.getElementById('studentName').value.trim();
    if(!name) { alert('Please enter your name.'); return; }
    let date = new Date().toLocaleDateString('en-US');
    let html = `
      <h2>📜 Certificate of Completion</h2>
      <p>This certifies that <strong>${escapeHtml(name)}</strong></p>
      <p>has successfully completed the <strong>Henan University Campus Treasure Hunt</strong></p>
      <p>by visiting all 6 historical landmarks:</p>
      <p style="font-size:0.9rem;">South Gate → Grand Auditorium → Building No.6 → Building No.7 → Old Library → Iron Pagoda</p>
      <p>Date: ${date}</p>
      <p style="margin-top:1rem;">🏅 Signed – Henan University Heritage Committee</p>
    `;
    document.getElementById('certResult').innerHTML = html;
    localStorage.clear();
  });
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
</script>
</body>
</html>
